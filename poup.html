<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
}

.card {
  width: 300px;
  height: 200px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;

.content {
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: white;
  z-index: 2;
}


.popup {
  position: absolute;
  bottom: -100%; 
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  color: white;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  transition: 0.4s;
}

.card:hover .popup {
  bottom: 0;
}
    </style>
</head>
<body>
    <div class="card">
  <img src="https://picsum.photos/300/200" alt="">

  <div class="content">
    <h3>Card Title</h3>
  </div>

 
  <div class="popup">
    <p>Bu yashirin text 👇</p>
    <button>Read more</button>
  </div>
</div>
</body>
</html>
