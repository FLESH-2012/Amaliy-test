<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amaily test</title>
    <link rel="stylesheet" href="https://picsum.photos/400/300">
    <style>

* {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}


body {
    background-color: aqua;
    display: flex;
    justify-content: center; 
    align-items: center;     
    height: 100vh;         
}


.card {
    background-color: white;
    width: 300px;
    border-radius: 12px;     
    overflow: hidden;        
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-5px); 
    box-shadow: 0 12px 24px rgba(13, 12, 12, 0.1);
}


.image-container {
    width: 100%;
    height: 180px; 
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
}

.content  {
    font-size: 20px;
    color: #333;
    margin-bottom: 8px;
    font-weight: 600;
}

.content  {
    font-size: 14px;
    color: #777; 
    margin-bottom: 20px;
    line-height: 1.5;
}
.btn:hover {
    background-color: rgb(51, 119, 159)  ; 
    
}
.btn {
    background-color: #3498db;
    color: white;   
    padding: 10px;
    border: none;
    border-radius: 5px; 
    font-size: 14px;
    transition: background-color 0.3s;
}
.popup {
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}


    </style>

</head>
<body>
    <div class="card">
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="">
        </div>
        
        <div class="content">
            <h3>Cool Product</h3>
            <p>This is a simple product card example.</p>
            <button class="btn">More Info</button>
    </div>

</body>
</html>
</body>
</html>
