<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        https://suret.pics/uploads/posts/2023-09/1695226642_1-1.jpg
        /* Umumiy sozlamalar */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    /* Rasmdagi kabi gradient fon */
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
}

/* Karta dizayni */
.card {
    background-color: white;
    width: 300px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

/* Rasm qismi */
.image-container {
    position: relative;
    width: 100%;
    height: 180px;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* "NEW" yozuvi (Badge) */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: #3498db;
    color: white;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 4px;
}

/* Matn qismi */
.content {
    padding: 20px;
}

.content h3 {
    font-size: 20px;
    color: #333;
    margin-bottom: 10px;
}

.content p {
    font-size: 14px;
    color: #777;
    margin-bottom: 20px;
}

/* Tugma dizayni */
.btn {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
}

.btn:hover {
    background-color: #2980b9;
}
    </style>
</head>
<body>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="image-container">
            <span class="badge">NEW</span>
            <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="Product Image">
        </div>
        <div class="content">
            <h3>Cool Product</h3>
            <p>This is a simple product card example.</p>
            <button class="btn">More Info</button>
        </div>
    </div>

</body>
</html>
</body>
</html>
